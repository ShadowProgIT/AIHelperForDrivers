version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models:ro
      - ./Modelfile:/Modelfile:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  python-backend:
    build: ./python-backend
    container_name: python-ai-service
    ports:
      - "8000:8000"  
    volumes:
      - ./python-backend:/app
      - ./data:/app/data
    environment:
      - OLLAMA_URL=http://ollama-server:11434  
      - REDIS_HOST=redis-cache                  
      - REDIS_PORT=6379
    depends_on:
      - ollama
      - redis
    restart: unless-stopped

volumes:
  ollama_data:
  redis_data: