<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #333; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        header { background: #1a73e8; color: white; padding: 1rem 2rem; text-align: center; border-radius: 0 0 12px 12px; margin-bottom: 1.5rem; }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        .chat-container { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: calc(100vh - 180px); max-height: 700px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { max-width: 75%; padding: 0.75rem 1rem; border-radius: 16px; position: relative; }
        .message.user { background: #1a73e8; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.ai { background: #f1f3f4; color: #202124; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; font-size: 0.75rem; opacity: 0.8; }
        .message-content { word-wrap: break-word; }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 0.5rem; }
        .chat-form { padding: 1rem 1.5rem; border-top: 1px solid #e0e0e0; background: #fafafa; border-radius: 0 0 12px 12px; }
        .form-row { display: flex; gap: 0.75rem; align-items: flex-end; }
        .form-row textarea { flex: 1; padding: 0.75rem 1rem; border: 1px solid #dadce0; border-radius: 24px; resize: none; font-size: 1rem; min-height: 44px; }
        .form-row textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .form-row button { background: #1a73e8; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 24px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .form-row button:hover { background: #1557b0; }
        .empty-state { text-align: center; color: #5f6368; padding: 3rem 1rem; }
        @media (max-width: 600px) { .message { max-width: 90%; } .form-row { flex-direction: column; } .form-row button { width: 100%; } }
    </style>
</head>
<body>
<header><h1>🚗 Driving Assistant</h1></header>
<div class="container">
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div th:if="${#lists.isEmpty(messages)}" class="empty-state">
                <p>👋 Привет! Я ваш помощник по вождению.</p>
                <p>Задайте вопрос о ПДД или опишите дорожную ситуацию.</p>
            </div>
            <div th:each="msg : ${messages}"
                 th:classappend="${msg.sender.name() == 'USER'} ? 'message user' : 'message ai'"
                 class="message">
                <div class="message-header">
                    <span th:text="${msg.sender.name() == 'USER'} ? 'Вы' : 'Ассистент'"></span>
                    <span class="timestamp" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></span>
                </div>
                <div class="message-content" th:text="${msg.content}"></div>
                <img th:if="${msg.imageUrl != null and !#strings.isEmpty(msg.imageUrl)}"
                     th:src="${msg.imageUrl}" alt="Attached image">
            </div>
        </div>
        <form th:action="@{/chat}" th:object="${request}" method="post" class="chat-form">
            <input type="hidden" name="sessionId" th:value="${sessionId}">
            <div class="form-row">
                <textarea name="content" th:field="*{content}" placeholder="Напишите сообщение..." rows="1" required></textarea>
                <button type="submit">Отправить</button>
            </div>
        </form>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chat = document.getElementById('chatMessages');
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
