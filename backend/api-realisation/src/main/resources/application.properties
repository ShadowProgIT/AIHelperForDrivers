# ???????? ?????????
server.port=8080
spring.application.name=AIHelperDrivers
spring.profiles.active=dev

# POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_helper
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=2
session.ttl.seconds=7200

# PYTHON AI SERVICE
ai.service.url=http://localhost:8000
ai.service.timeout=15000
ai.service.connect-timeout=5000

# THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML




